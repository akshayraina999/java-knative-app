# java-knative-app/k8s-manifests/knative-service.yaml
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: java-knative-service
  namespace: devops-tools
spec:
  template:
    metadata:
      annotations:
        # Tells Knative to scale all the way down to 0 replicas if no requests come in within 60s
        autoscaling.knative.dev/window: "60s"
    spec:
      containers:
        - image: harbor-core.devops-tools.svc.cluster.local:80/apps/java-knative-service:14
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"